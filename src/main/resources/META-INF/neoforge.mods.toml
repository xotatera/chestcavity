modLoader = "kotlinforforge"
loaderVersion = "[5,)"
license = "Apache-2.0"
issueTrackerURL = "https://github.com/Tigereye504/chestcavity/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "Chest Cavity"
description = '''Perfectly Safe Extra Storage'''
authors = "David Troyer"
logoFile = "assets/chestcavity/icon.png"

[[mixins]]
config = "chestcavity.mixins.json"

[[accessTransformers]]
file = "META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
